{% verbatim %}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>leavehub</title>
<style>
  :root {
    --fg:#0f172a; --muted:#64748b; --line:#e2e8f0; --line2:#f1f5f9;
    --accent:#4f46e5; --accent-weak:#eef2ff; --bg:#f8fafc; --card:#ffffff;
    --ok:#047857; --okbg:#ecfdf5; --err:#b91c1c; --errbg:#fef2f2;
    --warn:#b45309; --warnbg:#fffbeb; --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { font: 14.5px/1.55 -apple-system, system-ui, "Segoe UI", sans-serif; color: var(--fg);
         background: var(--bg); margin: 0; }
  button { font: inherit; cursor: pointer; }
  .hidden { display: none !important; }
  .muted { color: var(--muted); }

  /* layout */
  .layout { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
  aside { background: var(--card); border-right: 1px solid var(--line); padding: 18px 14px;
          position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 19px;
           padding: 6px 8px 16px; letter-spacing: -.01em; }
  .logo { width: 26px; height: 26px; border-radius: 7px; background: linear-gradient(135deg,#6366f1,#4f46e5);
          display: grid; place-items: center; color: #fff; font-size: 14px; }
  nav.side { display: flex; flex-direction: column; gap: 2px; }
  nav.side button { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    background: none; border: 0; color: var(--muted); padding: 9px 11px; border-radius: 9px;
    font-weight: 550; }
  nav.side button:hover { background: var(--line2); color: var(--fg); }
  nav.side button.active { background: var(--accent-weak); color: var(--accent); }
  nav.side .ico { width: 18px; text-align: center; font-size: 15px; }
  .side-foot { margin-top: auto; border-top: 1px solid var(--line); padding-top: 12px; }
  .userchip { display: flex; align-items: center; gap: 10px; padding: 6px 8px; }
  .userchip .meta { min-width: 0; }
  .userchip .n { font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .userchip .r { font-size: 12px; text-transform: capitalize; }
  .signout { width: 100%; margin-top: 8px; background: #fff; border: 1px solid var(--line);
             border-radius: 9px; padding: 8px; color: var(--fg); font-weight: 600; }
  .signout:hover { background: var(--line2); }

  /* content */
  .content { min-width: 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px;
            padding: 20px 30px; border-bottom: 1px solid var(--line); background: var(--card); }
  .topbar h1 { margin: 0; font-size: 21px; letter-spacing: -.01em; }
  .topbar .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  main { padding: 26px 30px; max-width: 1000px; }

  .btn { background: var(--accent); color: #fff; border: 0; border-radius: 9px;
         padding: 9px 16px; font-weight: 650; }
  .btn:hover { filter: brightness(1.06); }
  .btn.ghost { background: #fff; color: var(--fg); border: 1px solid var(--line); }
  .btn.ghost:hover { background: var(--line2); }
  .btn.sm { padding: 6px 11px; font-size: 13px; border-radius: 8px; }
  .btn.ok { background: var(--ok); } .btn.warn { background: var(--warn); }
  .btn.danger { background: #fff; color: var(--err); border: 1px solid #fecaca; }

  section.card { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
                 padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  section.card > h3 { margin: 0 0 14px; font-size: 15px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; font-weight: 550; }
  input, select, textarea { width: 100%; padding: 10px 11px; border: 1px solid var(--line);
    border-radius: 9px; font: inherit; background: #fff; color: var(--fg); }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent-weak); border-color: var(--accent); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

  /* kpis */
  .kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 22px; }
  .kpi { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px;
         box-shadow: var(--shadow); }
  .kpi .n { font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
  .kpi .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
            margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 9px 12px; font-size: 11.5px; text-transform: uppercase;
       letter-spacing: .05em; color: var(--muted); border-bottom: 1px solid var(--line); }
  td { padding: 11px 12px; border-bottom: 1px solid var(--line2); vertical-align: middle; }
  tr.clickable:hover td { background: var(--line2); cursor: pointer; }

  .avatar { width: 30px; height: 30px; border-radius: 50%; display: inline-grid; place-items: center;
            color: #fff; font-size: 12px; font-weight: 700; flex: 0 0 auto; }
  .person { display: flex; align-items: center; gap: 9px; }
  .pill { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 999px;
          text-transform: capitalize; font-weight: 600; }
  .pending { background: var(--warnbg); color: var(--warn); }
  .approved { background: var(--okbg); color: var(--ok); }
  .rejected { background: var(--errbg); color: var(--err); }
  .cancelled { background: var(--line2); color: var(--muted); }
  .role-badge { background: var(--accent-weak); color: var(--accent); }
  .tag-you { background: var(--accent-weak); color: var(--accent); font-size: 11px; padding: 1px 7px;
             border-radius: 999px; margin-left: 6px; }
  .empty { color: var(--muted); text-align: center; padding: 28px; }

  /* calendar */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-title { font-size: 17px; font-weight: 700; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .cal-dow { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
             text-align: center; padding: 4px 0; font-weight: 650; }
  .cal-cell { min-height: 92px; border: 1px solid var(--line); border-radius: 10px; padding: 6px;
              background: #fff; display: flex; flex-direction: column; gap: 3px; }
  .cal-cell.out { background: var(--line2); opacity: .55; }
  .cal-cell.weekend { background: #fcfcfd; }
  .cal-cell .dnum { font-size: 12px; font-weight: 650; color: var(--muted); }
  .cal-cell.today .dnum { color: #fff; background: var(--accent); width: 22px; height: 22px;
                          border-radius: 50%; display: grid; place-items: center; }
  .cal-chip { font-size: 11px; padding: 2px 6px; border-radius: 6px; background: var(--accent-weak);
              color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
              display: flex; align-items: center; gap: 5px; }
  .cal-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }

  /* auth */
  .authwrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
  .authcard { width: 100%; max-width: 400px; }
  .authcard .brand { justify-content: center; font-size: 24px; padding-bottom: 8px; }
  .tabrow { display: flex; gap: 6px; background: var(--line2); padding: 4px; border-radius: 10px;
            margin: 4px 0 12px; }
  .tabrow button { flex: 1; border: 0; background: none; padding: 8px; border-radius: 7px;
                   font-weight: 600; color: var(--muted); }
  .tabrow button.on { background: #fff; color: var(--fg); box-shadow: var(--shadow); }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); display: grid;
             place-items: center; padding: 20px; z-index: 40; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; box-shadow: var(--shadow);
           max-height: 90vh; overflow: auto; }
  .modal-h { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px;
             border-bottom: 1px solid var(--line); }
  .modal-h h3 { margin: 0; font-size: 16px; }
  .modal-b { padding: 20px; }
  .modal-f { padding: 16px 20px; border-top: 1px solid var(--line); display: flex; gap: 8px;
             justify-content: flex-end; flex-wrap: wrap; }
  .x { border: 0; background: none; font-size: 20px; color: var(--muted); line-height: 1; }
  .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px 12px; }
  .kv dt { color: var(--muted); font-size: 13px; }
  .kv dd { margin: 0; font-weight: 550; }
  .reason-box { margin-top: 14px; background: var(--line2); border-radius: 10px; padding: 12px 14px; }
  .reason-box .lbl { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em;
                     color: var(--muted); margin-bottom: 4px; font-weight: 650; }

  #msg { position: fixed; right: 22px; bottom: 22px; max-width: 340px; padding: 13px 16px;
         border-radius: 11px; box-shadow: var(--shadow); display: none; z-index: 60; font-weight: 550; }
  #msg.ok { background: var(--ok); color: #fff; display: block; }
  #msg.err { background: var(--err); color: #fff; display: block; }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    aside { position: static; height: auto; flex-direction: row; flex-wrap: wrap; align-items: center; }
    nav.side { flex-direction: row; flex-wrap: wrap; flex: 1; }
    .side-foot { margin: 0; border: 0; padding: 0; }
    .signout { width: auto; margin: 0; }
    .kpis { grid-template-columns: 1fr; } .grid2 { grid-template-columns: 1fr; }
    main, .topbar { padding: 18px; }
  }
</style>
</head>
<body>
<div id="app-root"></div>
<div id="modal-root"></div>
<div id="msg"></div>

<script>
const API = "/api/v1";
const S = {
  token: localStorage.getItem("lh_token"),
  refresh: localStorage.getItem("lh_refresh"),
  me: null, view: "dashboard",
  cal: new Date(),
};
const $ = (s, r = document) => r.querySelector(s);
const el = (t, p = {}, kids = []) => {
  const n = document.createElement(t);
  for (const [k, v] of Object.entries(p)) {
    if (v === false || v == null) continue;
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else if (k === "style") n.style.cssText = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const c of [].concat(kids)) if (c || c === 0) n.append(c);
  return n;
};
function toast(t, ok = true) {
  const m = $("#msg"); m.textContent = t; m.className = ok ? "ok" : "err";
  clearTimeout(toast._t); toast._t = setTimeout(() => (m.className = "hidden"), 3800);
}
const isHR = () => S.me && S.me.role === "hr";
const canDecide = () => S.me && (S.me.role === "hr" || S.me.role === "manager");
const cap = (s) => s ? s[0].toUpperCase() + s.slice(1) : s;

// avatar color from a name
function hue(name) { let h = 0; for (const c of name || "") h = (h * 31 + c.charCodeAt(0)) % 360; return h; }
function avatar(name, size = 30) {
  const init = (name || "?").slice(0, 2).toUpperCase();
  return el("span", { class: "avatar",
    style: `width:${size}px;height:${size}px;background:hsl(${hue(name)} 62% 48%)` }, init);
}
function person(name, you) {
  return el("span", { class: "person" }, [avatar(name),
    el("span", {}, [el("strong", {}, name), you ? el("span", { class: "tag-you" }, "you") : ""])]);
}
const pill = (s) => el("span", { class: "pill " + s }, s);
const page = (d) => Array.isArray(d) ? d : (d.results || []);
const fmt = (d) => d;  // dates come pre-formatted YYYY-MM-DD

// ---- api ----
async function api(path, { method = "GET", body, auth = true, _retry = false } = {}) {
  const headers = { "Content-Type": "application/json" };
  if (auth && S.token) headers["Authorization"] = "Bearer " + S.token;
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (res.status === 401 && auth && S.refresh && !_retry && await refresh()) {
    return api(path, { method, body, auth, _retry: true });
  }
  let data = null; try { data = await res.json(); } catch (e) {}
  if (res.status === 204) return null;
  if (!res.ok) {
    const d = data && (data.detail || (typeof data === "object" ? Object.values(data).flat().join(" ") : ""));
    throw new Error(d || "HTTP " + res.status);
  }
  return data;
}
async function refresh() {
  try {
    const d = await api("/auth/token/refresh/", { method: "POST", auth: false, body: { refresh: S.refresh } });
    S.token = d.access; localStorage.setItem("lh_token", d.access); return true;
  } catch (e) { signOut(); return false; }
}
async function login(u, p) {
  const d = await api("/auth/token/", { method: "POST", auth: false, body: { username: u, password: p } });
  S.token = d.access; S.refresh = d.refresh;
  localStorage.setItem("lh_token", d.access); localStorage.setItem("lh_refresh", d.refresh);
  await boot();
}
function signOut() {
  S.token = S.refresh = S.me = null;
  localStorage.removeItem("lh_token"); localStorage.removeItem("lh_refresh");
  renderAuth();
}

// ---- shell ----
const NAV = [
  ["dashboard", "Dashboard", "🏠"],
  ["requests", "Requests", "📋"],
  ["new", "New request", "➕"],
  ["calendar", "Calendar", "📅", canDecide],
  ["people", "Team", "👥", canDecide],
  ["types", "Leave types", "🏷️"],
];
const TITLES = {
  dashboard: ["Dashboard", "Your balances and recent activity"],
  requests: ["Leave requests", "Review and act on requests"],
  new: ["New leave request", "Book time off"],
  calendar: ["Team calendar", "Approved leave across the team"],
  people: ["Team", "People you manage"],
  types: ["Leave types", "Policies and allocations"],
};

async function boot() {
  S.me = await api("/me/");
  renderShell(); go(S.view || "dashboard");
}
function renderShell() {
  const nav = el("nav", { class: "side" });
  for (const [id, label, ico, gate] of NAV) {
    if (gate && !gate()) continue;
    nav.append(el("button", { id: "nav-" + id, onclick: () => go(id) },
      [el("span", { class: "ico" }, ico), label]));
  }
  const aside = el("aside", {}, [
    el("div", { class: "brand" }, [el("span", { class: "logo" }, "L"), "leavehub"]),
    nav,
    el("div", { class: "side-foot" }, [
      el("div", { class: "userchip" }, [avatar(S.me.username, 34),
        el("div", { class: "meta" }, [el("div", { class: "n" }, S.me.username),
          el("div", { class: "r muted" }, S.me.role)])]),
      el("button", { class: "signout", onclick: signOut }, "Sign out"),
    ]),
  ]);
  const content = el("div", { class: "content" }, [
    el("div", { class: "topbar" }, [el("div", {}, [el("h1", { id: "pg-title" }, ""),
      el("div", { class: "sub", id: "pg-sub" }, "")])]),
    el("main", { id: "main" }, ""),
  ]);
  $("#app-root").innerHTML = ""; $("#app-root").append(el("div", { class: "layout" }, [aside, content]));
}
function go(view) {
  S.view = view;
  document.querySelectorAll("nav.side button").forEach((b) => b.classList.remove("active"));
  $("#nav-" + view) && $("#nav-" + view).classList.add("active");
  const [t, s] = TITLES[view] || [view, ""];
  $("#pg-title").textContent = t; $("#pg-sub").textContent = s;
  renderView();
}
async function renderView() {
  const r = $("#main"); r.innerHTML = "<div class='empty'>Loading…</div>";
  try {
    if (S.view === "dashboard") return await viewDashboard(r);
    if (S.view === "requests") return await viewRequests(r);
    if (S.view === "new") return await viewNew(r);
    if (S.view === "calendar") return await viewCalendar(r);
    if (S.view === "people") return await viewPeople(r);
    if (S.view === "types") return await viewTypes(r);
  } catch (e) { r.innerHTML = ""; r.append(el("section", { class: "card" }, el("div", { class: "empty" }, e.message))); }
}

// ---- auth ----
function renderAuth() {
  let mode = "login";
  const u = el("input", { placeholder: "e.g. alice", autofocus: "" });
  const p = el("input", { type: "password", placeholder: "••••••••" });
  const submitBtn = el("button", { class: "btn", style: "width:100%;margin-top:16px" }, "Sign in");
  const tabs = el("div", { class: "tabrow" }, [
    el("button", { class: "on", onclick: () => setMode("login") }, "Sign in"),
    el("button", { onclick: () => setMode("register") }, "Register"),
  ]);
  function setMode(m) {
    mode = m;
    tabs.children[0].classList.toggle("on", m === "login");
    tabs.children[1].classList.toggle("on", m === "register");
    submitBtn.textContent = m === "login" ? "Sign in" : "Create account";
  }
  const submit = async () => {
    const un = u.value.trim(), pw = p.value;
    if (!un || !pw) return toast("Enter a username and password", false);
    try {
      if (mode === "register") await api("/auth/register/", { method: "POST", auth: false, body: { username: un, password: pw } });
      await login(un, pw);
      toast(mode === "register" ? "Account created" : "Welcome back");
    } catch (e) { toast(e.message, false); }
  };
  submitBtn.addEventListener("click", submit);
  p.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
  const demoRow = el("div", { class: "tabrow", style: "margin-top:8px" },
    [["hannah", "HR"], ["mike", "manager"], ["evan", "employee"]].map(([un, role]) =>
      el("button", {
        onclick: async () => {
          try { await login(un, "leavehub123"); toast(`Signed in as ${un}`); }
          catch (e) { toast(e.message, false); }
        },
      }, `${un} · ${role}`)));
  $("#app-root").innerHTML = "";
  $("#app-root").append(el("div", { class: "authwrap" }, el("section", { class: "card authcard" }, [
    el("div", { class: "brand" }, [el("span", { class: "logo" }, "L"), "leavehub"]),
    el("p", { class: "muted", style: "text-align:center;margin:0 0 8px" }, "Leave & attendance management"),
    tabs,
    el("label", {}, "Username"), u,
    el("label", {}, "Password"), p,
    submitBtn,
    el("p", { class: "muted", style: "text-align:center;margin:16px 0 6px;font-size:12px" },
      "Demo accounts — one click signs you in"),
    demoRow,
  ])));
}

// ---- dashboard ----
async function viewDashboard(r) {
  const [balances, reqs] = await Promise.all([
    api("/me/balances/").then(page), api("/leave-requests/").then(page),
  ]);
  const mine = reqs.filter((x) => x.employee === S.me.id);
  const remaining = balances.reduce((a, b) => a + parseFloat(b.remaining), 0);
  const pending = mine.filter((x) => x.status === "pending").length;
  const approved = mine.filter((x) => x.status === "approved").length;
  r.innerHTML = "";
  r.append(el("div", { class: "kpis" }, [
    kpi(remaining.toFixed(0), "Days remaining"),
    kpi(pending, "Pending requests"),
    kpi(approved, "Approved this cycle"),
  ]));
  const bcard = el("section", { class: "card" }, el("h3", {}, "My balances"));
  bcard.append(balances.length ? balancesTable(balances) : el("div", { class: "empty" }, "No balances yet."));
  r.append(bcard);
  const recent = mine.slice(0, 5);
  const rc = el("section", { class: "card" }, el("h3", {}, "My recent requests"));
  rc.append(recent.length ? requestsTable(recent) : el("div", { class: "empty" }, "You haven't requested any leave yet."));
  r.append(rc);
}
function kpi(n, l) { return el("div", { class: "kpi" }, [el("div", { class: "n" }, String(n)), el("div", { class: "l" }, l)]); }
function balancesTable(balances) {
  const t = el("table", {}, el("tr", {}, ["Type", "Year", "Accrued", "Used", "Pending", "Remaining"].map((h) => el("th", {}, h))));
  for (const b of balances) t.append(el("tr", {}, [
    el("td", {}, el("strong", {}, b.leave_type_name)), el("td", {}, String(b.year)),
    el("td", {}, String(b.accrued)), el("td", {}, String(b.used)), el("td", {}, String(b.pending)),
    el("td", { html: `<strong>${b.remaining}</strong>` }),
  ]));
  return t;
}

// ---- requests ----
function requestsTable(reqs) {
  const t = el("table", {}, el("tr", {}, ["Employee", "Type", "Dates", "Days", "Status", ""].map((h) => el("th", {}, h))));
  for (const q of reqs) {
    const row = el("tr", { class: "clickable", onclick: () => openRequest(q) }, [
      el("td", {}, person(q.employee_username, q.employee === S.me.id)),
      el("td", {}, q.leave_type_name),
      el("td", {}, `${fmt(q.start_date)} → ${fmt(q.end_date)}`),
      el("td", {}, String(q.days)),
      el("td", {}, pill(q.status)),
      el("td", { class: "muted", style: "text-align:right" }, "›"),
    ]);
    t.append(row);
  }
  return t;
}
async function viewRequests(r) {
  const reqs = await api("/leave-requests/").then(page);
  r.innerHTML = "";
  const card = el("section", { class: "card" });
  card.append(reqs.length ? requestsTable(reqs) : el("div", { class: "empty" }, "No requests to show."));
  r.append(card);
}

// ---- request detail + decision modal ----
function closeModal() { $("#modal-root").innerHTML = ""; }
function openRequest(q) {
  const owner = q.employee === S.me.id;
  const decidable = q.status === "pending" && canDecide() && !owner;
  const note = el("textarea", { rows: "2", placeholder: "Optional note (shown on rejection)" });

  const kv = el("dl", { class: "kv" }, [
    el("dt", {}, "Employee"), el("dd", {}, person(q.employee_username, owner)),
    el("dt", {}, "Leave type"), el("dd", {}, q.leave_type_name),
    el("dt", {}, "Dates"), el("dd", {}, `${fmt(q.start_date)} → ${fmt(q.end_date)}`),
    el("dt", {}, "Working days"), el("dd", {}, String(q.days)),
    el("dt", {}, "Status"), el("dd", {}, pill(q.status)),
    q.approver_username ? el("dt", {}, "Decided by") : null,

  const body = el("div", { class: "modal-b" }, [

      el("div", {}, q.reason ? q.reason : el("span", { class: "muted" }, "No reason provided."))]),
    q.decision_note ? el("div", { class: "reason-box" }, [el("div", { class: "lbl" }, "Decision note"),

  $("#modal-root").innerHTML = ""; $("#modal-root").append(overlay);
}
async function decide(id, action, note) {

// ---- calendar (month grid) ----
function ymd(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
async function viewCalendar(r) {
  const cur = S.cal;
  const first = new Date(cur.getFullYear(), cur.getMonth(), 1);
  const startDow = (first.getDay() + 6) % 7;               // Monday-first
  const gridStart = new Date(first); gridStart.setDate(1 - startDow);
  const gridEnd = new Date(gridStart); gridEnd.setDate(gridStart.getDate() + 41);
  const rows = await api(`/calendar/?from=${ymd(gridStart)}&to=${ymd(gridEnd)}`).then(page);

  // map date -> [{name,type,hue}]
  const byDay = {};
  for (const q of rows) {
    let d = new Date(q.start_date + "T00:00:00");
    const end = new Date(q.end_date + "T00:00:00");
    while (d <= end) {
      (byDay[ymd(d)] ||= []).push({ name: q.employee_username, type: q.leave_type_name });
      d.setDate(d.getDate() + 1);
    }
  }
  const monthName = cur.toLocaleString("default", { month: "long", year: "numeric" });
  const today = ymd(new Date());
  r.innerHTML = "";
  const grid = el("div", { class: "cal-grid" });
  for (const dn of ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]) grid.append(el("div", { class: "cal-dow" }, dn));
  const d = new Date(gridStart);
  for (let i = 0; i < 42; i++) {
    const key = ymd(d), inMonth = d.getMonth() === cur.getMonth();
    const weekend = d.getDay() === 0 || d.getDay() === 6;
    const cell = el("div", { class: "cal-cell" + (inMonth ? "" : " out") + (weekend ? " weekend" : "") + (key === today ? " today" : "") },
      el("div", { class: "dnum" }, String(d.getDate())));
    const people = byDay[key] || [];
    for (const p of people.slice(0, 3)) cell.append(el("div", { class: "cal-chip", title: `${p.name} · ${p.type}` },
      [el("span", { class: "cal-dot", style: `background:hsl(${hue(p.name)} 62% 48%)` }), p.name]));
    if (people.length > 3) cell.append(el("div", { class: "muted", style: "font-size:11px;padding-left:2px" }, `+${people.length - 3} more`));
    grid.append(cell); d.setDate(d.getDate() + 1);
  }
  const shift = (n) => { S.cal = new Date(cur.getFullYear(), cur.getMonth() + n, 1); renderView(); };
  r.append(el("section", { class: "card" }, [
    el("div", { class: "cal-head" }, [
      el("div", { class: "cal-title" }, monthName),
      el("div", { class: "cal-nav" }, [
        el("button", { class: "btn ghost sm", onclick: () => shift(-1) }, "‹ Prev"),
        el("button", { class: "btn ghost sm", onclick: () => { S.cal = new Date(); renderView(); } }, "Today"),
        el("button", { class: "btn ghost sm", onclick: () => shift(1) }, "Next ›"),
      ]),
    ]),
    grid,
    el("p", { class: "muted", style: "font-size:13px;margin:14px 0 0" },
      isHR() ? "Showing approved leave across everyone." : "Showing approved leave for your team."),
  ]));
}
