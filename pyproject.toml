[tool.ruff]
line-length = 100
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]  # pycodestyle, pyflakes, isort, pyupgrade, bugbear, django

[tool.coverage.run]
source = ["."]
omit = ["*/migrations/*", "*/tests/*", "manage.py", "*/settings.py",
        "*/wsgi.py", "*/asgi.py", ".venv/*"]

[tool.coverage.report]
show_missing = true
fail_under = 85
